# MySQL database connection
spring.datasource.url=jdbc:mysql://<RDS-ENDPOINT>:3306/<DB-NAME>?useSSL=false&serverTimezone=UTC
spring.datasource.username=<DB-USERNAME>
spring.datasource.password=<DB-PASSWORD>

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server port inside container
server.port=8080

# Spring Data REST base path (optional, makes /products API available)
spring.data.rest.base-path=/products
