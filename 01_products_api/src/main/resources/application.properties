# Use environment variables for security
spring.datasource.url=jdbc:mysql://${SPRING_DATASOURCE_HOST:database-1.clsuuoy8ym73.ap-south-1.rds.amazonaws.com}:3306/${SPRING_DATASOURCE_NAME:ecommerce}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Expose Spring Data REST endpoints fully
spring.data.rest.base-path=/  # Root path for REST endpoints
spring.data.rest.default-page-size=20
spring.data.rest.return-body-on-create=true
